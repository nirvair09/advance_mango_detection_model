<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangoAI | Intelligent Ripeness Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1 class="logo">Mango<span>AI</span></h1>
            <p class="subtitle">Advanced Ripeness Classification & Detection</p>
        </header>

        <section class="glass-card">
            <div class="upload-section" id="drop-zone">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-content" id="upload-content">
                    <div class="icon">📸</div>
                    <h3>Upload Mango Image</h3>
                    <p>Drag and drop or click to browse</p>
                </div>
                <div class="preview-container" id="preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button class="remove-btn" id="remove-btn">✕</button>
                </div>
            </div>

            <div class="actions">
                <button id="process-btn" class="btn btn-primary" disabled>
                    <span class="btn-text">Process Image</span>
                    <span class="loader" id="btn-loader" style="display: none;"></span>
                </button>
            </div>

            <div id="results-container" class="results-container" style="display: none;">
                <div class="divider"></div>
                <div class="result-layout">
                    <div class="result-image-box">
                        <h4>Annotated Result</h4>
                        <img id="result-image" src="" alt="Result">
                    </div>
                    <div class="result-data-box">
                        <h4>Analysis Summary</h4>
                        <div class="detection-badge" id="detection-status">Detected</div>
                        <div class="counts-grid" id="counts-grid">
                            <!-- Counts will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <p>© 2026 MangoAI System. All models active.</p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
